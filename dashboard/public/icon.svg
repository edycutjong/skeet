<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <linearGradient id="skeetGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="80" y1="400" x2="432" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="60%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#0A0E14"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#skeetGrad)" opacity="0.08"/>

  <!-- clay disc / skeet target: crosshair ring -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="120" stroke="url(#skeetGrad)" stroke-width="20" opacity="0.9"/>
    <circle cx="256" cy="256" r="44" fill="url(#skeetGrad)"/>
  </g>

  <!-- momentum-up / exit-before-cliff arc: rises, crests, drops to the exit dot -->
  <path d="M88 392 C 168 392, 196 168, 300 168 C 372 168, 388 256, 424 320"
        stroke="url(#arcGrad)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>

  <!-- exit dot (in USDC, before the cliff) -->
  <circle cx="424" cy="320" r="20" fill="#F97316" filter="url(#glow)"/>
</svg>
