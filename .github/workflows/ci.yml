name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Code Quality ─────────────────────────────────
  quality:
    name: "Stage 1 · Quality Gate"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install dashboard dependencies
        run: npm ci --prefix dashboard
      - name: Run root CI quality checks
        run: npm run ci
      - name: Latency benchmark check
        run: npm run bench
      - name: Offline safety check
        run: npm run verify-offline
      - name: Backtest validation
        run: npm run backtest

  # ── STAGE 2: Security Gate ────────────────────────────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true # Don't block build if pre-existing keys but alert

  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── STAGE 3: Build Verification ───────────────────────────
  build:
    name: "Stage 3 · Build Verification"
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix dashboard
      - name: Next.js production build
        run: npm run build --prefix dashboard

  # ── STAGE 4: End-to-End Tests ─────────────────────────────
  e2e:
    name: "Stage 4 · Playwright E2E"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix dashboard
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Next.js production build
        run: npm run build --prefix dashboard
      - name: Run Playwright tests
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── STAGE 5: Performance ──────────────────────────────────
  performance:
    name: "Stage 5 · Performance"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix dashboard
      - name: Build application
        run: npm run build --prefix dashboard
      - name: Lighthouse CI
        run: npm run lighthouse
        continue-on-error: true

  # ── STAGE 6: Deploy Gate (main only) ──────────────────────
  deploy-gate:
    name: "Stage 6 · Deploy Gate"
    needs: [build, e2e, performance, secret-scan, dependency-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: All gates passed
        run: |
          echo "🚀 All CI/CD gates passed!"
          echo ""
          echo "Pipeline Summary:"
          echo "  ✅ Stage 1 — Quality (lint, typecheck, unit tests, latency bench)"
          echo "  ✅ Stage 2 — Secret Scanning & Dependency Audit"
          echo "  ✅ Stage 3 — Build Verification"
          echo "  ✅ Stage 4 — Playwright E2E Suites"
          echo "  ✅ Stage 5 — Lighthouse Performance Audit"
